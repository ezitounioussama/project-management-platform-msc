services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scrumboard-app
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongo:27017/scrumboard
      - MAILPIT_HOST=mailpit
      - MAILPIT_SMTP_PORT=1025
      - MAILPIT_API_PORT=8025
    depends_on:
      mongo:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - scrumboard-network
    restart: unless-stopped

  mongo:
    image: mongo:8
    container_name: scrumboard-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - scrumboard-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: scrumboard-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=scrumboard-mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      mongo:
        condition: service_started
    networks:
      - scrumboard-network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: scrumboard-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - scrumboard-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local

networks:
  scrumboard-network:
    driver: bridge
